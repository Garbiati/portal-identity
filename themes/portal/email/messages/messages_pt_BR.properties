# ==========================================================================================
# Tema de E-MAIL — doc hub / Portal Telemedicina  (PT-BR, UTF-8)
# Sobrescreve os assuntos padrão do Keycloak e concentra todas as strings de marca/empresa.
# ==========================================================================================

# ---- Assuntos (a linha de "assunto" que aparece na caixa de entrada) ----------------------
#  Claros, com o nome do produto, sem termos que disparam spam ("clique aqui", "urgente"...).
executeActionsSubject=Configure seu acesso ao doc hub
passwordResetSubject=Redefinição de senha do doc hub
emailVerificationSubject=Confirme seu e-mail do doc hub

# ---- Preheader (texto de pré-visualização; aparece ao lado do assunto na lista de e-mails) -
executeActionsPreheader=Defina sua senha para ativar o seu acesso ao doc hub.
passwordResetPreheader=Crie uma nova senha para a sua conta no doc hub.
emailVerificationPreheader=Confirme o seu e-mail para concluir a configuração do seu acesso.

# ---- Marca / produto ----------------------------------------------------------------------
#  NOTE(marca): o nome exibido "doc hub" está estilizado (duas cores) direto no HTML do cabeçalho
#  em html/template.ftl (não dá para colorir metade de uma string via .properties). Estas chaves
#  são usadas no <title>, nas versões TEXT e na descrição do produto.
brandName=doc hub
productDescription=O doc hub é a plataforma de gestão de capacidade médica da Portal Telemedicina — escalas, médicos e agendamentos.

# ---- Rodapé / assinatura da empresa -------------------------------------------------------
#  >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>  ATENÇÃO — PLACEHOLDERS  <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
#  Substitua os valores entre [[ ]] pelos DADOS REAIS da empresa antes de subir para produção.
#  Estas chaves são referenciadas no rodapé de TODOS os e-mails (html/template.ftl + text/*.ftl).
companyName=Portal Telemedicina
companyCnpj=[[CNPJ]]
companyAddress=[[ENDEREÇO]]
supportEmail=[[suporte@portaltelemedicina.com.br]]
companySite=[[https://portaltelemedicina.com.br]]
#  >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>

footerAutomated=Este é um e-mail automático — por favor, não responda a esta mensagem.
