# Tema de E-MAIL do doc hub / Portal Telemedicina (D-074).
# Objetivo: substituir o e-mail padrão do Keycloak (genérico, "cara de phishing") por um layout
# profissional, table-based e com CSS INLINE — porque clientes de e-mail ignoram <style>/CSS externo
# e NÃO carregam resources de tema (por isso este tema não declara `styles=` nem usa imagens de tema).
#
# parent=keycloak apenas encadeia para `base` (o tema `keycloak/email` é só `parent=base`), então
# herdamos as mensagens de sistema (ex.: unidades de expiração do link em pt-BR) e sobrescrevemos
# todos os .ftl e os assuntos em messages_pt_BR.properties.
parent=keycloak

# Internacionalização — só PT-BR (o realm também fixa defaultLocale=pt-BR).
locales=pt-BR
