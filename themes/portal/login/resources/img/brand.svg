<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" fill="none" font-family="'Segoe UI', Roboto, system-ui, Arial, sans-serif">
  <!-- Logo: marca doc hub "Pulso Divisor" v9.4 (chip navy #021E30 · filete azul · ECG âmbar) -->
  <g transform="translate(0,2)">
    <rect x="1.4" y="1.4" width="53.2" height="53.2" rx="14" fill="#021E30" stroke="#0073BD" stroke-width="2"/>
    <path d="M6 34 H16 L20 37 L25 27 L30 41 L34 30 L38 34 H58" fill="none" stroke="#E8763A" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round" transform="translate(1.6,0.5) scale(0.83)"/>
  </g>
  <text x="68" y="38" font-size="26" font-weight="700" fill="#FFFFFF">doc <tspan fill="#F07A1E">hub</tspan></text>

  <!-- Headline -->
  <text x="0" y="120" font-size="33" font-weight="700" fill="#FFFFFF">Planejamento de</text>
  <text x="0" y="160" font-size="33" font-weight="700" fill="#FFFFFF">capacidade médica</text>

  <!-- Lead -->
  <text x="0" y="208" font-size="15.5" fill="#FFFFFF" fill-opacity="0.82">Escale médicos, atenda à demanda dos governos</text>
