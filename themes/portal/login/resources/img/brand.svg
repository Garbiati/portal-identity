<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 350" width="480" height="350" fill="none" font-family="'Inter','Segoe UI',Roboto,system-ui,Arial,sans-serif">
  <!-- Marca Doctor Hub "Hub Orbital" (rebranding 2026-07-05, escolha do Alessandro): chip navy #0E1B2E,
       filete OURO #C6A052, anel de órbita + 3 satélites (nós brancos) ligados ao nó CENTRAL em ouro — o
       hub que conecta médicos, escalas e agendamentos. Mesma arte do app/favicon. -->
  <g transform="scale(0.9)">
    <rect x="2" y="2" width="60" height="60" rx="15" fill="#0E1B2E" stroke="#C6A052" stroke-width="1" stroke-opacity="0.45"/>
    <circle cx="32" cy="33" r="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="1.3"/>
    <g stroke="#FFFFFF" stroke-opacity="0.34" stroke-width="1.4" stroke-linecap="round">
      <line x1="32" y1="33" x2="32" y2="17"/><line x1="32" y1="33" x2="46" y2="41"/><line x1="32" y1="33" x2="18" y2="41"/>
    </g>
    <circle cx="32" cy="17" r="3.4" fill="#FFFFFF"/><circle cx="46" cy="41" r="3.4" fill="#FFFFFF"/><circle cx="18" cy="41" r="3.4" fill="#FFFFFF"/>
    <circle cx="32" cy="33" r="6.6" fill="#C6A052"/><circle cx="32" cy="33" r="2.6" fill="#0E1B2E" fill-opacity="0.55"/>
  </g>

  <!-- Wordmark "Doctor Hub" — "Doctor" claro + "Hub" em ouro #C6A052 (6.9:1 sobre navy, AA) -->
  <text x="66" y="41" font-size="30" font-weight="700" fill="#FFFFFF">Doctor <tspan fill="#C6A052">Hub</tspan></text>

  <!-- Filete de acento OURO (substitui o antigo "Pulso Divisor" âmbar) -->
  <path d="M0 88 H300" stroke="#C6A052" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Headline — posicionamento atual: distribuição da capacidade médica (doc 28) -->
  <text x="0" y="152" font-size="38" font-weight="800" fill="#FFFFFF">Capacidade médica</text>
  <text x="0" y="194" font-size="38" font-weight="800" fill="#FFFFFF">no lugar certo,</text>
  <text x="0" y="236" font-size="38" font-weight="800" fill="#FFFFFF">na hora certa.</text>

  <!-- Lead — os 3 diferenciais (doc 28), sem inventar claim/número -->
  <text x="0" y="284" font-size="16" fill="#FFFFFF" fill-opacity="0.82">Crie escalas com facilidade, veja a</text>
  <text x="0" y="307" font-size="16" fill="#FFFFFF" fill-opacity="0.82">capacidade em tempo real e distribua</text>
  <text x="0" y="330" font-size="16" fill="#FFFFFF" fill-opacity="0.82">os médicos conforme cada cliente.</text>
</svg>
