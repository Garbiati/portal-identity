<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 56" width="210" height="56" fill="none" font-family="'Inter','Segoe UI',Roboto,system-ui,Arial,sans-serif">
  <!-- Marca Doctor Hub "Hub Orbital" p/ o card branco (login mobile). Chip navy #0E1B2E c/ filete ouro;
       wordmark "Doctor" navy + "Hub" em ouro ESCURO #8A6A2E (5:1 sobre branco, AA). Mesma arte do app. -->
  <g transform="translate(2,2) scale(0.8125)">
    <rect x="2" y="2" width="60" height="60" rx="15" fill="#0E1B2E" stroke="#C6A052" stroke-width="1.2" stroke-opacity="0.5"/>
    <circle cx="32" cy="33" r="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="1.3"/>
    <g stroke="#FFFFFF" stroke-opacity="0.34" stroke-width="1.4" stroke-linecap="round">
      <line x1="32" y1="33" x2="32" y2="17"/><line x1="32" y1="33" x2="46" y2="41"/><line x1="32" y1="33" x2="18" y2="41"/>
    </g>
    <circle cx="32" cy="17" r="3.4" fill="#FFFFFF"/><circle cx="46" cy="41" r="3.4" fill="#FFFFFF"/><circle cx="18" cy="41" r="3.4" fill="#FFFFFF"/>
    <circle cx="32" cy="33" r="6.6" fill="#C6A052"/><circle cx="32" cy="33" r="2.6" fill="#0E1B2E" fill-opacity="0.55"/>
  </g>
  <text x="66" y="37" font-size="23" font-weight="700" fill="#0E1B2E">Doctor <tspan fill="#8A6A2E">Hub</tspan></text>
</svg>
